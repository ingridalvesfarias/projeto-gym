<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymAI | Seu Personal IA</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <main class="card">
            <header>
                <h1>Gym<span>AI</span></h1>
                <p>Seu plano de treino e dieta gerado por IA.</p>
            </header>

            <section class="form-group">
                <label for="peso">Peso atual (kg)</label>
                <input type="number" id="peso" placeholder="Ex: 80">

                <label for="altura">Altura (cm)</label>
                <input type="number" id="altura" placeholder="Ex: 175">

                <label for="objetivo">Qual seu objetivo?</label>
                <select id="objetivo">
                    <option value="Ganhar massa muscular (Hipertrofia)">Ganhar Massa</option>
                    <option value="Emagrecer (Definição)">Emagrecer</option>
                    <option value="Condicionamento Físico">Condicionamento</option>
                </select>

                <section class="form-group">
                    <div class="button-group">
                        <button id="btnGerar">Gerar Plano</button>
                        <div>
                            <button id="btnLimpar">Limpar</button>
                            <button id="btnCopiar">Copiar</button>
                        </div>
                        <div id="mensagemStatus"
                            style="text-align: center; margin-top: 10px; font-size: 0.9rem; height: 20px;"></div>
                    </div>
                </section>
            </section>

            <section id="resultado" class="resultado-container"></section>
        </main>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
